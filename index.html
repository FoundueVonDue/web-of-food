<!DOCTYPE html>


<html lang="en">





<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.5, maximum-scale=1.0, user-scalable=no">
    <title>Det gastronomiska släktträdet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    


<div id="search-container" style="position: fixed; top: 20px; left: 20px; z-index: 1000;">
    <input type="text" id="search-input" 
           list="plant-suggestions"
           placeholder="Sök efter en växt.." 
           style="padding: 8px; font-size: 16px; width: 250px; border: 1px solid #ccc; border-radius: 4px;">
    <datalist id="plant-suggestions"></datalist>
    <button id="search-button" 
            style="padding: 8px 12px; font-size: 16px; margin-left: 4px; border-radius: 4px; cursor: pointer;">
        Sök
    </button>
    <button id="reset-button" 
            style="padding: 8px 12px; font-size: 16px; margin-left: 4px; border-radius: 4px; cursor: pointer; background-color: #f58e4f; color: white;">
        Återställ
    </button>
    <div id="search-result" style="margin-top: 8px; font-size: 16px; color: #555;"></div>


</div>

    <nav style="position: fixed; top: 20px; right: 40px; z-index: 1000;">
        <a href="about.html" style="padding: 3px 10px; font-size: 16px; background: #97cdf9; color: white; text-decoration: none; border-radius: 4px;">
            Om hemsidan
        </a>
    </nav>
    <nav style="position: fixed; top: 55px; right: 40px; z-index: 1000;">

            Källor
        </a>
    </nav>


    <script src="d3.min.js"></script>
